<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ trip.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4 transition-colors duration-200">
    <div class="max-w-md mx-auto pb-20">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">{{ trip.name }}</h1>
            <a href="/" class="text-blue-500 font-bold">← Home</a>
        </header>

        <form action="/add_item/{{ trip.id }}" method="POST" class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm mb-6 space-y-3">
            <div class="flex gap-2">
                <input type="text" name="name" placeholder="Item name" required class="flex-1 p-2 border rounded dark:bg-gray-700 dark:border-gray-600">
                <input type="number" name="quantity" value="1" class="w-16 p-2 border rounded text-center dark:bg-gray-700 dark:border-gray-600">
            </div>
            <select name="category" class="w-full p-2 border rounded bg-white dark:bg-gray-700 dark:border-gray-600">
                <option value="Clothing">Clothing</option>
                <option value="Toiletries">Toiletries</option>
                <option value="Other">Other</option>
                <option value="Documents">Documents</option>
            </select>
            <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg font-bold">Add to List</button>
        </form>

<div class="space-y-6">
    {% set current_cat = namespace(val='') %}
    {% for item in items %}
        {% if item.category != current_cat.val %}
            {% if not loop.first %}
                    </div> </details>
            </div> {% endif %}
            
            <div class="category-group">
                <details open class="group">
                    <summary class="flex items-center cursor-pointer list-none py-2 outline-none">
                        <span class="transition-transform group-open:rotate-90 mr-2 text-blue-500 text-xs">▶</span>
                        <h2 class="text-xs font-black text-gray-400 dark:text-gray-500 uppercase tracking-widest">{{ item.category }}</h2>
                    </summary>
                    <div class="space-y-3 mt-2">
            {% set current_cat.val = item.category %}
        {% endif %}

            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm flex items-center justify-between border border-transparent dark:border-gray-700">
                <div class="flex items-center flex-1">
                    <input type="checkbox" id="item-{{ item.id }}" class="w-6 h-6 rounded border-gray-300 dark:bg-gray-700" 
                        {% if item.packed %}checked{% endif %} onclick="toggleItem({{ item.id }})">
                    <label for="item-{{ item.id }}" class="ml-4 text-lg">
                        {{ item.name }} <span class="text-gray-400 text-sm ml-1">x{{ item.quantity }}</span>
                    </label>
                </div>
                <form action="/delete_item/{{ item.id }}" method="POST" onsubmit="return confirm('Remove this item?')">
                    <button type="submit" class="text-gray-400 hover:text-red-500 px-2 text-2xl leading-none">&times;</button>
                </form>
            </div>
    
            {% if loop.last %}
                        </div> </details>
                </div> {% endif %}
        {% endfor %}
    </div>
    </div>

    <script>
        function toggleItem(id) { fetch(`/toggle/${id}`, { method: 'POST' }); }
    </script>
</body>
</html>
