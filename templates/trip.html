<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Packing: {{ trip.name }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto p-4">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">{{ trip.name }}</h1>
            <a href="/" class="text-blue-600 font-bold">← Back</a>
        </header>

        <div class="space-y-2">
            {% for item in items %}
            <div class="bg-white p-4 rounded-lg shadow flex items-center">
                <input type="checkbox" id="item-{{ item.id }}" 
                    class="w-6 h-6 mr-4" 
                    {% if item.packed %}checked{% endif %}
                    onclick="toggleItem({{ item.id }})">
                <label for="item-{{ item.id }}" class="text-lg flex-1">{{ item.name }}</label>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        function toggleItem(id) {
            fetch(`/toggle/${id}`, { method: 'POST' });
        }
    </script>
</body>
</html>
