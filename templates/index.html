<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Packer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 p-4 transition-colors duration-200">
    <div class="max-w-md mx-auto">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">My Trips</h1>
        </header>

        <form action="/create_trip" method="POST" class="mb-8">
            <div class="flex gap-2">
                <input type="text" name="name" placeholder="Where to?" required 
                    class="flex-1 p-3 border rounded-lg dark:bg-gray-800 dark:border-gray-700 dark:text-white">
                <button type="submit" class="bg-blue-600 text-white px-6 py-3 rounded-lg font-bold">Add</button>
            </div>
        </form>

        <div class="space-y-4">
            {% for trip in trips %}
            <div class="bg-white dark:bg-gray-800 p-4 rounded-xl shadow-sm flex justify-between items-center border border-transparent dark:border-gray-700">
                <div>
                    <h3 class="text-xl font-semibold">{{ trip.name }}</h3>
                    <p class="text-sm text-gray-500 dark:text-gray-400">Created: {{ trip.date }}</p>
                </div>
                <div class="flex gap-2">
                    <a href="/trip/{{ trip.id }}" class="bg-green-500 text-white px-4 py-2 rounded-lg font-bold">Pack</a>
                    <form action="/clone_trip/{{ trip.id }}" method="POST" class="inline" onsubmit="return confirm('Clone this trip and all its items?')">
                        <button type="submit" class="text-blue-500 hover:text-blue-700 font-medium text-sm px-2 py-1 border border-blue-500 rounded-md transition-colors">
                            📋 Clone
                        </button>
                    </form>
                    <form action="/delete_trip/{{ trip.id }}" method="POST" onsubmit="return confirm('Delete trip?')">
                        <button type="submit" class="bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400 px-4 py-2 rounded-lg font-bold text-sm">Delete</button>
                    </form>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
